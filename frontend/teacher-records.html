<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance - Attendance Records</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="logo">
      📊 Smart Attendance System
    </div>
    <ul class="nav-menu">
      <li><a href="teacher-dashboard.html">Dashboard</a></li>
      <li><a href="teacher-mark-attendance.html">Mark Attendance</a></li>
      <li><a href="teacher-records.html">Records</a></li>
      <div style="flex: 1;"></div>
      <span id="userInfo" style="color: #64748b; margin-right: 1rem;"></span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </ul>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 2rem; color: white;">Attendance Records</h1>

    <div class="card" style="margin-bottom: 2rem;">
      <div class="card-header">🔍 Filter Records</div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <div>
          <label for="filterSubject">Subject</label>
          <input type="text" id="filterSubject" placeholder="Enter subject name">
        </div>
        <div>
          <label for="filterClass">Class/Section</label>
          <input type="text" id="filterClass" placeholder="Enter class name">
        </div>
        <div>
          <label for="filterStartDate">Start Date</label>
          <input type="date" id="filterStartDate">
        </div>
        <div>
          <label for="filterEndDate">End Date</label>
          <input type="date" id="filterEndDate">
        </div>
      </div>

      <div style="margin-top: 1rem;">
        <button type="button" class="btn btn-primary" id="filterBtn">🔍 Apply Filters</button>
        <button type="button" class="btn btn-secondary" id="resetFilterBtn">🔄 Reset</button>
        <button type="button" class="btn btn-success" id="exportBtn">⬇️ Export to CSV</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📊 Records</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Student Name</th>
              <th>Roll Number</th>
              <th>Subject</th>
              <th>Class</th>
              <th>Status</th>
              <th>Liveness</th>
              <th>Confidence</th>
            </tr>
          </thead>
          <tbody id="recordsTableBody">
            <tr>
              <td colspan="8" style="text-align: center; color: #64748b;">Loading records...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="margin-top: 2rem;">
      <a href="teacher-dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/teacher-records.js"></script>
</body>
</html>
