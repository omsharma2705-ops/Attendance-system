<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance - My Attendance</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="logo">
      📊 Smart Attendance System
    </div>
    <ul class="nav-menu">
      <li><a href="student-dashboard.html">Dashboard</a></li>
      <li><a href="student-face-register.html">Face Registration</a></li>
      <li><a href="student-attendance.html">My Attendance</a></li>
      <div style="flex: 1;"></div>
      <span id="userInfo" style="color: #64748b; margin-right: 1rem;"></span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </ul>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 2rem; color: white;">My Attendance</h1>

    <div class="card" style="margin-bottom: 2rem;">
      <div class="card-header">📊 Attendance Statistics</div>

      <div class="dashboard-grid">
        <div class="stat-card">
          <h3>Total Classes</h3>
          <div class="stat-value" id="totalClasses">0</div>
        </div>
        <div class="stat-card" style="border-top-color: #10b981;">
          <h3>Present</h3>
          <div class="stat-value" style="color: #10b981;" id="presentCount">0</div>
        </div>
        <div class="stat-card" style="border-top-color: #ef4444;">
          <h3>Absent</h3>
          <div class="stat-value" style="color: #ef4444;" id="absentCount">0</div>
        </div>
        <div class="stat-card" style="border-top-color: #f59e0b;">
          <h3>Attendance %</h3>
          <div class="stat-value" style="color: #f59e0b;" id="attendancePercentage">0%</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🔍 Filter Records</div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <div>
          <label for="filterSubject">Subject</label>
          <input type="text" id="filterSubject" placeholder="Enter subject name">
        </div>
        <div>
          <label for="filterStartDate">Start Date</label>
          <input type="date" id="filterStartDate">
        </div>
        <div>
          <label for="filterEndDate">End Date</label>
          <input type="date" id="filterEndDate">
        </div>
      </div>

      <div style="margin-top: 1rem;">
        <button type="button" class="btn btn-primary" id="filterBtn">🔍 Apply Filters</button>
        <button type="button" class="btn btn-secondary" id="resetFilterBtn">🔄 Reset</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📅 Attendance History</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Subject</th>
              <th>Class</th>
              <th>Teacher</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="attendanceTableBody">
            <tr>
              <td colspan="6" style="text-align: center; color: #64748b;">Loading records...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="margin-top: 2rem;">
      <a href="student-dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/student-attendance-history.js"></script>
</body>
</html>
