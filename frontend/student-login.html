<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance - Student Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="logo">
      📊 Smart Attendance System
    </div>
    <ul class="nav-menu">
      <li><a href="student-register.html">Student Register</a></li>
      <li><a href="teacher-login.html">Teacher Login</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="form-container">
      <h1 style="text-align: center; margin-bottom: 2rem; color: #2563eb;">Student Login</h1>

      <div id="successMessage" class="alert alert-success" style="display: none;"></div>
      <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>

        <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
          Don't have an account? <a href="student-register.html" style="color: #2563eb;">Register here</a>
        </p>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/student-login.js"></script>
</body>
</html>
